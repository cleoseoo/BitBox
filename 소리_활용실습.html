<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6-BIT CYBER SYNTH STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050B14;
            --bg-panel: #0B1320;
            --cyber-cyan: #00F0FF;
            --cyber-magenta: #FF003C;
            --cyber-yellow: #FCE205;
            --cyber-green: #00FF66;
            --key-white: #E0F2FE;
            --key-black: #0F172A;
            --text-main: #E0F2FE;
        }

        * { box-sizing: border-box; user-select: none; font-family: 'Pretendard', sans-serif; touch-action: manipulation; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background-color: var(--bg-deep);
            background-image: linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            overflow: hidden;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }

        .dashboard {
            background: rgba(11, 19, 32, 0.85); border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 12px; padding: 2vh 2vw; box-shadow: 0 0 50px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); 
            width: 98vw; max-width: 1800px; height: 96vh;
            display: flex; flex-direction: column; gap: 1.5vh;
        }

        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(0,240,255,0.2); padding-bottom: 1vh;}
        .title { font-size: clamp(1.2rem, 2.5vw, 2.2rem); font-weight: 900; color: var(--cyber-cyan); text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); margin: 0;}
        .ergonomic-badge { background: rgba(0, 255, 102, 0.1); border: 1px solid var(--cyber-green); color: var(--cyber-green); padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 800; display: inline-block; margin-top: 8px;}

        /* LCD 패널 */
        .lcd-panel {
            background: #000; border: 2px solid var(--cyber-cyan); border-radius: 6px;
            padding: 1.5vh 2vw; display: flex; justify-content: space-between; align-items: center;
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.15); height: 10vh; min-height: 70px;
        }
        .lcd-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 25%;}
        .lcd-label { font-size: clamp(0.5rem, 0.8vw, 0.8rem); color: #94A3B8; margin-bottom: 5px; font-weight: 800;}
        .lcd-value { font-size: clamp(1rem, 1.8vw, 1.8rem); font-weight: 900; color: #FFF; text-shadow: 0 0 10px rgba(255,255,255,0.5); font-family: 'Orbitron';}
        .lcd-value.highlight { color: var(--cyber-yellow); }
        .lcd-value.binary { color: var(--cyber-green); letter-spacing: 2px;}

        /* 피아노 건반 */
        .piano-wrapper {
            width: 100%; flex-grow: 1; background: #000; border-radius: 4px;
            border: 1px solid #1E293B; overflow: hidden; position: relative;
        }
        #piano { position: relative; width: 100%; height: 100%; display: block; }

        .white-key {
            position: absolute; height: 100%; background: var(--key-white);
            border: 1px solid #94A3B8; border-top: none; border-radius: 0 0 6px 6px;
            cursor: pointer; box-shadow: inset -1px -5px 10px rgba(0,0,0,0.2); transition: 0.1s;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 1.5vh;
        }
        .white-key.active { background: var(--cyber-cyan); box-shadow: 0 0 30px var(--cyber-cyan); transform: translateY(2px);}

        .black-key {
            position: absolute; height: 60%; background: var(--key-black);
            border: 1px solid #334155; border-top: none; border-radius: 0 0 4px 4px;
            cursor: pointer; z-index: 2; transition: 0.1s;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 1.2vh;
        }
        .black-key.active { background: var(--cyber-magenta); box-shadow: 0 0 25px var(--cyber-magenta);}

        .bin-label { font-family: 'Orbitron'; font-weight: 800; text-align: center; margin-bottom: 6px; line-height: 1; }
        .white-key .bin-label { color: #000; font-size: clamp(0.6rem, 1vw, 1rem); }
        .black-key .bin-label { color: #FFF; font-size: clamp(0.45rem, 0.75vw, 0.8rem); }

        .keycap {
            background: rgba(0, 0, 0, 0.85); color: #FFF; font-family: 'Orbitron'; font-weight: 900;
            font-size: clamp(0.7rem, 1vw, 1.2rem); padding: 4px 8px; border-radius: 4px; border: 1px solid #64748B;
        }
        .black-key .keycap { background: rgba(255, 255, 255, 0.95); color: #000; border: 1px solid #94A3B8; font-size: clamp(0.6rem, 0.8vw, 1rem); }

        .c-badge { background: #FF003C; color: #FFF; padding: 4px 8px; border-radius: 4px; font-size: clamp(0.6rem, 0.9vw, 0.9rem); position: absolute; top: 1.5vh; font-family: 'Orbitron'; font-weight: bold;}

        /* 터미널 및 컨트롤 */
        .terminal {
            width: 100%; height: 28vh; min-height: 180px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255, 0, 60, 0.4);
            border-radius: 6px; padding: 1.5vh 2vw; display: flex; flex-direction: column; gap: 1vh;
        }
        .code-input {
            width: 100%; flex-grow: 1; background: #050B14; border: 1px solid #1E293B; color: var(--cyber-green);
            font-size: clamp(1.1rem, 1.5vw, 1.5rem); padding: 1vh 1vw; outline: none; letter-spacing: 2px; border-radius: 4px; resize: none;
        }
        .controls { display: flex; gap: 1.5vw; justify-content: flex-end; flex-wrap: wrap; align-items: center;}
        
        /* 템포 슬라이더 스타일 */
        .tempo-box { display: flex; align-items: center; gap: 10px; background: rgba(252, 226, 5, 0.1); padding: 5px 15px; border-radius: 4px; border: 1px solid rgba(252, 226, 5, 0.3);}
        input[type=range] { cursor: pointer; accent-color: var(--cyber-yellow); }

        .btn {
            background: transparent; border: 1px solid var(--cyber-cyan); color: var(--cyber-cyan);
            padding: 1vh 1.2vw; font-size: clamp(0.7rem, 1vw, 0.9rem); font-weight: 900; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: rgba(0, 240, 255, 0.1); }
        .btn.play-btn { background: var(--cyber-cyan); color: #000; min-width: 110px; }
        .btn.stop-btn { background: var(--cyber-magenta); border-color: var(--cyber-magenta); color: #FFF; min-width: 110px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <div class="title-box">
                <h1 class="title cyber-font">6-BIT CYBER SYNTH STUDIO</h1>
                <div class="subtitle">데이터 시각화 피아노 : 속도 제어 및 인체공학적 배열</div>
                <div class="ergonomic-badge">🤚 왼손: C3~B3 (하단) &nbsp;&nbsp;|&nbsp;&nbsp; 🖐 오른손: C4~B5 (상단/우측)</div>
            </div>
            <div class="cyber-font" style="color:var(--cyber-yellow); font-size: clamp(0.8rem, 1.5vw, 1.2rem);">6-BIT MEMORY</div>
        </div>

        <div class="lcd-panel">
            <div class="lcd-item">
                <div class="lcd-label">입력 키</div>
                <div class="lcd-value" id="lcd-key">[ - ]</div>
            </div>
            <div class="lcd-item">
                <div class="lcd-label">음계</div>
                <div class="lcd-value highlight" id="lcd-note" style="color:var(--cyber-yellow)">--</div>
            </div>
            <div class="lcd-item" style="width: 30%;">
                <div class="lcd-label">이진수 주소 (6-BIT)</div>
                <div class="lcd-value binary" id="lcd-bin">------</div>
            </div>
            <div class="lcd-item">
                <div class="lcd-label">십진수 값</div>
                <div class="lcd-value" id="lcd-dec">--</div>
            </div>
        </div>

        <div class="piano-wrapper">
            <div id="piano"></div>
        </div>

        <div class="terminal">
            <div class="terminal-header cyber-font"><span>> OFFLINE_COMPILER.exe</span> <span id="terminal-status">READY</span></div>
            <textarea id="binaryInput" class="code-input cyber-font" placeholder="이진수 코드를 입력하거나 예제를 로드하세요..."></textarea>
            
            <div class="controls">
                <div class="tempo-box">
                    <span class="cyber-font" style="font-size: 0.7rem; color: var(--cyber-yellow);">속도(ms)</span>
                    <input type="range" id="tempoSlider" min="100" max="1000" value="450" step="50" oninput="updateTempo(this.value)">
                    <span id="tempoValue" class="cyber-font" style="color: var(--cyber-cyan); font-size: 0.9rem; min-width: 50px;">450ms</span>
                </div>

                <button class="btn" style="border-color:var(--cyber-magenta); color:var(--cyber-magenta);" onclick="loadSong('bitbox')">🔥 비트박스</button>
                <button class="btn" onclick="loadSong('beethoven')">환희의 송가</button>
                <button class="btn" onclick="loadSong('star')">작은 별</button>
                <button class="btn" style="border-color:#64748B; color:#94A3B8;" onclick="clearInput()">초기화</button>
                <button class="btn play-btn" id="btnPlay" onclick="togglePlay()">▶ 연주 시작</button>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const TOTAL_WHITE_KEYS = 21;
        let isPlaying = false;
        let playTimeoutIds = [];
        let currentTempo = 450; 

        // 수정완료: J와 M이 물리적 키보드와 일치하도록 교정되었습니다.
        const keyLabels = ['Z','S','X','D','C','V','G','B','H','N','J','M','Q','2','W','3','E','R','5','T','6','Y','7','U','I','9','O','0','P','[','-',']','=','\\','←','↵'];
        const keyCodes = ['z','s','x','d','c','v','g','b','h','n','j','m','q','2','w','3','e','r','5','t','6','y','7','u','i','9','o','0','p','[','-',']','=','\\','backspace','enter'];

        const notes = [];
        const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const isBlack = [false, true, false, true, false, false, true, false, true, false, true, false];
        let whiteIndex = 0; 

        for(let i=0; i<36; i++) {
            let noteIdx = i % 12; 
            let octave = 3 + Math.floor(i / 12);
            let freq = 130.81 * Math.pow(2, i / 12);
            notes.push({ dec: i, bin: i.toString(2).padStart(6, '0'), name: noteNames[noteIdx] + octave, freq: freq.toFixed(2), isBlack: isBlack[noteIdx], whiteIdx: isBlack[noteIdx] ? whiteIndex : whiteIndex++, keyCode: keyCodes[i] });
        }

        const piano = document.getElementById('piano');
        const keyElements = [];
        const wWidth = 100 / TOTAL_WHITE_KEYS; 
        const bWidth = wWidth * 0.65; 

        notes.forEach((n, index) => {
            const key = document.createElement('div');
            key.className = n.isBlack ? 'black-key' : 'white-key';
            key.style.width = (n.isBlack ? bWidth : wWidth) + '%';
            key.style.left = n.isBlack ? (n.whiteIdx * wWidth - bWidth/2) + '%' : (n.whiteIdx * wWidth) + '%';
            let cBadge = (!n.isBlack && n.name.startsWith('C')) ? `<div class="c-badge">${n.name}</div>` : '';
            key.innerHTML = `${cBadge}<div class="bin-label">${n.bin}</div><div class="keycap">${keyLabels[index]}</div>`;
            key.addEventListener('mousedown', () => playSound(index));
            key.addEventListener('mouseup', () => removeActive(index));
            key.addEventListener('mouseleave', () => removeActive(index));
            key.addEventListener('touchstart', (e) => { e.preventDefault(); playSound(index); }, {passive: false});
            key.addEventListener('touchend', (e) => { e.preventDefault(); removeActive(index); }, {passive: false});
            piano.appendChild(key);
            keyElements.push(key);
        });

        function playSound(index) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const n = notes[index];
            document.getElementById('lcd-key').innerText = `[ ${keyLabels[index]} ]`;
            document.getElementById('lcd-note').innerText = n.name;
            document.getElementById('lcd-dec').innerText = n.dec;
            document.getElementById('lcd-bin').innerText = n.bin;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.value = n.freq;
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            keyElements[index].classList.add('active');
            setTimeout(() => keyElements[index].classList.remove('active'), 150);
        }

        function removeActive(index) { keyElements[index].classList.remove('active'); }

        const songs = {
            bitbox: { data: "000000 011000 001001 011000 000000 000000 001001 011000 000000 011000 001001 011000 000000 010111 001001 011000", tempo: 250 },
            beethoven: { data: "010000 010000 010001 010011 010011 010001 010000 001110 001100 001100 001110 010000 010000 001110 001110", tempo: 450 },
            star: { data: "001100 001100 010011 010011 010101 010101 010011 010001 010001 010000 010000 001110 001110 001100", tempo: 450 }
        };

        function updateTempo(val) {
            currentTempo = parseInt(val);
            document.getElementById('tempoValue').innerText = val + "ms";
        }

        function loadSong(s) {
            stopSequence();
            const song = songs[s];
            document.getElementById('binaryInput').value = song.data;
            document.getElementById('tempoSlider').value = song.tempo;
            updateTempo(song.tempo);
            document.getElementById('terminal-status').innerText = s.toUpperCase() + " LOADED";
        }

        function clearInput() {
            stopSequence();
            document.getElementById('binaryInput').value = '';
            document.getElementById('terminal-status').innerText = "CLEARED";
        }

        function togglePlay() {
            if (isPlaying) stopSequence();
            else playSequence();
        }

        async function playSequence() {
            const inputTxt = document.getElementById('binaryInput').value;
            const codes = inputTxt.split(/\s+/).filter(c => c.length === 6 || c === '......');
            if (codes.length === 0) return;

            isPlaying = true;
            const btn = document.getElementById('btnPlay');
            btn.innerHTML = "■ 연주 중단";
            btn.className = "btn stop-btn";
            document.getElementById('terminal-status').innerText = "SYSTEM EXECUTING...";

            for (let i = 0; i < codes.length; i++) {
                if (!isPlaying) break;
                
                const code = codes[i];
                const idx = notes.findIndex(n => n.bin === code);
                if (idx !== -1) playSound(idx);
                else {
                    document.getElementById('lcd-note').innerText = "REST";
                }
                
                // 수정완료: 비동기 타이머 제어를 안정화하여 중단 시 멈춤 현상(Memory Leak) 해결
                await new Promise(resolve => {
                    const id = setTimeout(() => {
                        resolve();
                        playTimeoutIds = playTimeoutIds.filter(t => t.id !== id);
                    }, currentTempo);
                    playTimeoutIds.push({id, resolve});
                });
            }
            if (isPlaying) stopSequence();
        }

        function stopSequence() {
            isPlaying = false;
            // 남아있는 타이머 정리 및 해제
            playTimeoutIds.forEach(t => {
                clearTimeout(t.id);
                if(typeof t.resolve === 'function') t.resolve(); 
            });
            playTimeoutIds = [];
            
            const btn = document.getElementById('btnPlay');
            btn.innerHTML = "▶ 연주 시작";
            btn.className = "btn play-btn";
            document.getElementById('terminal-status').innerText = "READY";
        }

        // 키보드 이벤트
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA') return;
            const idx = notes.findIndex(n => n.keyCode === e.key.toLowerCase());
            if(idx !== -1 && !e.repeat) { e.preventDefault(); playSound(idx); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.target.tagName === 'TEXTAREA') return;
            const idx = notes.findIndex(n => n.keyCode === e.key.toLowerCase());
            if(idx !== -1) removeActive(idx);
        });
    </script>
</body>
</html>
