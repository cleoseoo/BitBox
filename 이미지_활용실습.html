<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이미지 표현 방식 선택 | DATA BITBOX</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-deep: #050B14;
            --text-main: #E0F2FE;
        }

        * { cursor: default !important; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background-color: var(--bg-deep);
            color: var(--text-main); 
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ==========================================================
           ✅ DATA BITBOX 공통 네비바 (오른쪽 정렬 적용 완벽 복구)
           ========================================================== */
        #dbb-topnav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999999;
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 22px;
            background: rgba(18, 12, 30, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        
        #dbb-topnav a.dbb-btn {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.3px;
            text-decoration: none;
            padding: 6px 14px; border-radius: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.08);
            transition: all 0.18s ease;
            white-space: nowrap;
        }

        #dbb-topnav a.dbb-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        #dbb-topnav .dbb-title {
            display: flex; 
            align-items: center; 
            gap: 8px;
            margin-left: auto; /* ✅ 글자를 오른쪽 끝으로 정렬하는 마법! */
            font-size: 0.9rem; 
            font-weight: 800;
            color: #e9d5ff;
            letter-spacing: 0.5px;
        }

        /* ==========================================================
           ══ 선택 화면 영역 ══
           ========================================================== */
        #screen-select {
            display: flex; flex: 1; margin-top: 48px; height: calc(100vh - 48px);
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d2137 100%);
            position: relative;
        }
        #screen-select::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at 30% 50%, rgba(0, 245, 196, 0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 50%, rgba(10, 132, 255, 0.08) 0%, transparent 60%);
        }
        .sel-wrap { position: relative; z-index: 1; text-align: center; padding: 40px 20px; }
        .sel-title { font-size: 2.2rem; font-weight: 900; color: white; margin-bottom: 10px; letter-spacing: -0.02em; }
        .sel-sub { font-size: 1.8rem; color: rgba(255, 255, 255, 0.45); margin-bottom: 52px; font-weight: 600; }
        .sel-cards { display: flex; gap: 24px; align-items: stretch; justify-content: center; }
        
        .sel-card {
            width: 300px; padding: 44px 30px; border-radius: 28px;
            cursor: pointer !important; display: flex; flex-direction: column;
            align-items: center; gap: 14px; text-decoration: none;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s;
        }
        
        .sel-bitmap { background: linear-gradient(145deg, #0d2137, #1a3a5c); border: 1.5px solid rgba(10, 132, 255, 0.3); }
        .sel-bitmap:hover { transform: translateY(-14px) scale(1.03); box-shadow: 0 30px 60px rgba(10, 132, 255, 0.3); border-color: rgba(10, 132, 255, 0.7); }
        
        .sel-vector { background: linear-gradient(145deg, #0d1f0d, #1a3520); border: 1.5px solid rgba(0, 245, 196, 0.3); }
        .sel-vector:hover { transform: translateY(-14px) scale(1.03); box-shadow: 0 30px 60px rgba(0, 245, 196, 0.2); border-color: rgba(0, 245, 196, 0.7); }

        .sel-icon { line-height: 1; display: flex; align-items: center; justify-content: center; }
        .sel-chip { font-size: 0.6rem; font-weight: 900; letter-spacing: 4px; padding: 3px 14px; border-radius: 20px; text-transform: uppercase; }
        .sel-bitmap .sel-chip { background: rgba(10, 132, 255, 0.2); color: #5ac8fa; border: 1px solid rgba(10, 132, 255, 0.3); }
        .sel-vector .sel-chip { background: rgba(0, 245, 196, 0.15); color: #00f5c4; border: 1px solid rgba(0, 245, 196, 0.3); }
        
        .sel-name { font-size: 1.5rem; font-weight: 900; color: white; }
        .sel-desc { font-size: 0.85rem; color: rgba(255, 255, 255, 0.55); line-height: 1.75; text-align: center; font-weight: 600; }
        .sel-badge { font-size: 0.78rem; font-weight: 800; padding: 7px 20px; border-radius: 20px; margin-top: 4px; }
        .sel-bitmap .sel-badge { background: rgba(10, 132, 255, 0.15); color: #5ac8fa; }
        .sel-vector .sel-badge { background: rgba(0, 245, 196, 0.1); color: #00f5c4; }
        
        .sel-go { font-size: 0.88rem; font-weight: 900; padding: 11px 30px; border-radius: 20px; margin-top: 6px; transition: all 0.2s; }
        .sel-bitmap .sel-go { background: rgba(10, 132, 255, 0.2); color: #5ac8fa; }
        .sel-vector .sel-go { background: rgba(0, 245, 196, 0.12); color: #00f5c4; }
        .sel-bitmap:hover .sel-go { background: #0a84ff; color: white; }
        .sel-vector:hover .sel-go { background: #00f5c4; color: #0a1628; }
        .sel-vs { display: flex; align-items: center; justify-content: center; width: 60px; flex-shrink: 0; font-size: 1rem; font-weight: 900; color: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div id="dbb-topnav">
        <div style="display:flex; gap:9px; align-items:center;">
            <a class="dbb-btn" href="index.html">← 메인으로</a>
            <a class="dbb-btn" href="이미지_개념.html">📖 개념으로</a>
        </div>
        <span class="dbb-title">🖼️ 이미지의 디지털 표현 · 활용 실습</span>
    </div>

    <div id="screen-select">
        <div class="sel-wrap">
            <div class="sel-title">비트맵 이미지 & 벡터 이미지 체험 실습</div>
            <div class="sel-sub">이미지 표현 방법을 선택하세요. </div>
            <div class="sel-cards">
                <a class="sel-card sel-bitmap" href="이미지_비트맵_활용실습.html">
                    <div class="sel-icon">
                        <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <line x1="54" y1="54" x2="70" y2="70" stroke="rgba(255,255,255,0.9)" stroke-width="6" stroke-linecap="round"/>
                            <circle cx="34" cy="34" r="22" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="4"/>
                            <clipPath id="lens-clip"><circle cx="34" cy="34" r="19"/></clipPath>
                            <g clip-path="url(#lens-clip)">
                                <rect x="16" y="16" width="9" height="9" fill="rgba(255,255,255,0.55)" rx="1"/>
                                <rect x="26" y="16" width="9" height="9" fill="rgba(255,255,255,0.25)" rx="1"/>
                                <rect x="36" y="16" width="9" height="9" fill="rgba(255,255,255,0.55)" rx="1"/>
                                <rect x="16" y="26" width="9" height="9" fill="rgba(255,255,255,0.25)" rx="1"/>
                                <rect x="26" y="26" width="9" height="9" fill="rgba(255,255,255,0.9)" rx="1"/>
                                <rect x="36" y="26" width="9" height="9" fill="rgba(255,255,255,0.25)" rx="1"/>
                                <rect x="16" y="36" width="9" height="9" fill="rgba(255,255,255,0.55)" rx="1"/>
                                <rect x="26" y="36" width="9" height="9" fill="rgba(255,255,255,0.25)" rx="1"/>
                                <rect x="36" y="36" width="9" height="9" fill="rgba(255,255,255,0.55)" rx="1"/>
                            </g>
                        </svg>
                    </div>
                    <div class="sel-chip">Bitmap</div>
                    <div class="sel-name">비트맵 방식</div>
                    <div class="sel-desc">픽셀과 RGB 채널을 조작해<br>저해상도 이미지 속<br>동물을 구출하세요!</div>
                    <div class="sel-badge">🦁 비트맵 동물 구출 작전</div>
                    <div class="sel-go">▶ 시작하기</div>
                </a>

                <div class="sel-vs">VS</div>

                <a class="sel-card sel-vector" href="이미지_벡터_활용실습.html">
                    <div class="sel-icon">
                        <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <line x1="15" y1="65" x2="70" y2="65" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
                            <line x1="15" y1="65" x2="15" y2="10" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
                            <polyline points="65,61 70,65 65,69" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="11,15 15,10 19,15" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 55 C30 20, 50 20, 62 40" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="3" stroke-linecap="round"/>
                            <circle cx="22" cy="55" r="4.5" fill="rgba(255,255,255,0.95)"/>
                            <circle cx="42" cy="28" r="4.5" fill="rgba(255,255,255,0.7)"/>
                            <circle cx="62" cy="40" r="4.5" fill="rgba(255,255,255,0.95)"/>
                            <line x1="22" y1="55" x2="22" y2="65" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="3,3"/>
                            <line x1="62" y1="40" x2="62" y2="65" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="3,3"/>
                            <line x1="15" y1="55" x2="22" y2="55" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="3,3"/>
                            <line x1="15" y1="40" x2="62" y2="40" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="3,3"/>
                        </svg>
                    </div>
                    <div class="sel-chip">Vector</div>
                    <div class="sel-name">벡터 방식</div>
                    <div class="sel-desc">벡터 방식 이미지를 <br> 창의적으로 디자인하고 <br>디지털 코드를 확인하세요!</div>
                    <div class="sel-badge">🏫 벡터 이미지 스케치 미션</div>
                    <div class="sel-go">▶ 시작하기</div>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
